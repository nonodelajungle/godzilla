<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentRail — Control Tower</title>

<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background:#0a0b10;
  color:white;
}

.container {
  max-width:1000px;
  margin:80px auto;
  padding:20px;
}

.logo {
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:700;
  font-size:20px;
  margin-bottom:40px;
}

.logo img {
  width:40px;
  background:white;
  border-radius:10px;
}

.card {
  background:#11131c;
  border:1px solid #222;
  border-radius:20px;
  padding:30px;
  margin-bottom:20px;
}

.event {
  font-size:22px;
  font-weight:600;
}

.sub {
  color:#aaa;
  margin-top:8px;
}

.risk {
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:#1a0f12;
  border:1px solid #442;
}

.risk strong {
  color:#ff5f74;
}

.actions {
  margin-top:25px;
  display:flex;
  gap:12px;
}

button {
  padding:14px 18px;
  border-radius:12px;
  border:none;
  font-weight:600;
  cursor:pointer;
}

.approve { background:#19c37d; }
.block { background:#ff5f74; }
.shadow { background:#444; }

.log {
  margin-top:30px;
  font-family: monospace;
  font-size:13px;
  color:#bbb;
}

.line {
  margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="/logo.png">
    AgentRail
  </div>

  <div class="card">

    <div class="event" id="event">
      ⚡ En attente d'événement...
    </div>

    <div class="sub" id="sub">
      Clique pour simuler une action agent
    </div>

    <div class="risk" id="risk" style="display:none">
      <strong>Risk: HIGH (87)</strong><br>
      - write access<br>
      - no approval<br>
      - production repo
    </div>

    <div class="actions" id="actions" style="display:none">
      <button class="approve" onclick="decision('approve')">Approve</button>
      <button class="block" onclick="decision('block')">Block</button>
      <button class="shadow" onclick="decision('shadow')">Shadow</button>
    </div>

  </div>

  <div class="card">
    <strong>Audit log</strong>
    <div class="log" id="log"></div>
  </div>

  <button onclick="trigger()" style="margin-top:20px">
    ▶ Simuler un agent
  </button>

</div>

<script>
function trigger(){
  document.getElementById("event").innerHTML =
    "⚠️ github-agent tente de merger PR #482";

  document.getElementById("sub").innerHTML =
    "Target: production repository";

  document.getElementById("risk").style.display = "block";
  document.getElementById("actions").style.display = "flex";

  log("Agent detected → github-agent");
  log("Action → merge PR #482");
}

function decision(type){
  if(type==="approve"){
    log("✔ Approved → merge executed");
  }
  if(type==="block"){
    log("❌ Blocked → action cancelled");
  }
  if(type==="shadow"){
    log("👁 Shadow mode → observed only");
  }

  log("→ audit trail created");
  log("→ policy applied");

  document.getElementById("actions").style.display = "none";
}

function log(txt){
  const el = document.getElementById("log");
  el.innerHTML += `<div class="line">> ${txt}</div>`;
}
</script>

</body>
</html>
